name: Traffic Phantom Autonomous Run

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger with custom inputs
    inputs:
      site_name:
        description: 'Your site/brand name (used as X-Title header for OpenRouter)'
        required: false
        default: 'My Awesome Blog'
        type: string
      site_url:
        description: 'Your site URL (used as Referer header + comment URL field)'
        required: false
        default: 'https://example.com'
        type: string
      comment_author:
        description: 'Name to post comments under'
        required: false
        default: 'Fan'
        type: string
      comment_email:
        description: 'Email to use in comment forms'
        required: false
        default: 'fan@example.com'
        type: string

jobs:
  run-phantom:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Install Puppeteer Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgbm-dev \
          wget \
          unzip \
          fontconfig \
          locales \
          libasound2t64 \
          libatk1.0-0 \
          libc6 \
          libcairo2 \
          libcups2 \
          libdbus-1-3 \
          libexpat1 \
          libfontconfig1 \
          libgcc-s1 \
          libgdk-pixbuf-2.0-0 \
          libglib2.0-0 \
          libgtk-3-0 \
          libnspr4 \
          libpango-1.0-0 \
          libpangocairo-1.0-0 \
          libstdc++6 \
          libx11-6 \
          libx11-xcb1 \
          libxcb1 \
          libxcomposite1 \
          libxcursor1 \
          libxdamage1 \
          libxext6 \
          libxfixes3 \
          libxi6 \
          libxrandr2 \
          libxrender1 \
          libxss1 \
          libxtst6 \
          ca-certificates \
          fonts-liberation \
          libayatana-appindicator3-1 \
          libnss3 \
          lsb-release \
          xdg-utils

    - name: Run Phantom Cycle
      env:
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        # workflow_dispatch inputs override defaults; scheduled runs use fallbacks
        SITE_NAME: ${{ github.event.inputs.site_name || secrets.SITE_NAME || 'My Awesome Blog' }}
        SITE_URL: ${{ github.event.inputs.site_url || secrets.SITE_URL || 'https://example.com' }}
        COMMENT_AUTHOR: ${{ github.event.inputs.comment_author || secrets.COMMENT_AUTHOR || 'Fan' }}
        COMMENT_EMAIL: ${{ github.event.inputs.comment_email || secrets.COMMENT_EMAIL || 'fan@example.com' }}
      run: node run-one-cycle.js
